<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player — Fadill</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c14;
            --bg-card: rgba(14,16,24,0.85);
            --border: rgba(99,102,241,0.12);
            --cyan: #22d3ee;
            --purple: #8b5cf6;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --text-muted: #475569;
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: none;
        }
        html, body, a, button { cursor: none !important; }
        .cur { pointer-events:none; position:fixed; z-index:99999; transform:translate(-50%,-50%); font-size:26px; line-height:1; filter:drop-shadow(0 0 8px rgba(34,211,238,0.5)); transition:transform .15s; user-select:none; }
        .cur.hover { transform:translate(-50%,-50%) scale(1.4); }

        /* ═══ VINYL PLAYER ═══ */
        .player-wrap {
            position: relative;
            width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Album Cover */
        .album-cover {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            height: 280px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(34,211,238,0.08);
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .album-info {
            position: absolute;
            bottom: 16px;
            left: 16px;
            z-index: 3;
        }
        .album-artist {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .album-title {
            font-size: 13px;
            color: var(--cyan);
            font-weight: 500;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        /* Vinyl Disc */
        .vinyl-wrap {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        .vinyl {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                #111 0%,
                #111 18%,
                #1a1a1a 18.5%,
                #111 19%,
                #1a1a1a 28%,
                #111 28.5%,
                #1a1a1a 29%,
                #111 38%,
                #1a1a1a 38.5%,
                #111 39%,
                #1a1a1a 48%,
                #111 48.5%,
                #1a1a1a 49%,
                #111 100%
            );
            position: relative;
            box-shadow:
                0 0 0 3px rgba(40,40,40,0.5),
                0 0 60px rgba(0,0,0,0.8),
                inset 0 0 40px rgba(0,0,0,0.4);
            transition: transform 0.1s linear;
        }
        .vinyl.spinning {
            animation: spin 2s linear infinite;
        }
        .vinyl::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #111 60%, #0a0a0a 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 3;
        }

        /* Vinyl grooves */
        .vinyl::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 100%; height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 2px,
                rgba(60,60,60,0.15) 2px,
                rgba(60,60,60,0.15) 3px
            );
            z-index: 2;
        }

        /* Vinyl shine */
        .vinyl-shine {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.03) 100%);
            z-index: 4;
            pointer-events: none;
        }

        /* Label */
        .vinyl-label {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 76px; height: 76px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 5;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .vinyl-label img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .vinyl-hole {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--bg);
            z-index: 6;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ═══ CONTROLS ═══ */
        .controls {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }
        .ctrl-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.3s;
        }
        .ctrl-btn:hover {
            background: rgba(34,211,238,0.15);
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .ctrl-btn.play {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            color: #fff;
        }
        .ctrl-btn.play:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(34,211,238,0.4);
        }
        .ctrl-btn.play svg { width: 22px; height: 22px; }

        /* Progress */
        .progress-bar {
            position: absolute;
            bottom: 64px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            z-index: 10;
        }
        .progress-track {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            cursor: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--mono);
            margin-top: 6px;
        }

        /* Volume */
        .volume-wrap {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }
        .volume-wrap svg { width: 16px; height: 16px; color: var(--text-dim); }
        .volume-slider {
            -webkit-appearance: none;
            width: 80px; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: none;
        }

        /* ═══ BACK BTN ═══ */
        .back-btn {
            position: fixed;
            top: 24px; left: 24px;
            padding: 10px 18px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(34,211,238,0.15);
        }

        /* ═══ BG EFFECTS ═══ */
        .bg-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34,211,238,0.06) 0%, transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 { top: -100px; right: -100px; }
        .bg-glow-2 { bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%); }

        @media (max-width: 640px) {
            .player-wrap { width: 340px; height: 320px; }
            .album-cover { width: 160px; height: 160px; }
            .vinyl { width: 180px; height: 180px; }
            .vinyl-wrap { right: 20px; }
            .vinyl-label { width: 50px; height: 50px; }
            .vinyl::after { width: 50px; height: 50px; }
            .progress-bar { width: 260px; }
            .album-artist { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="cur" id="cur">💜</div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <a href="index.html" class="back-btn">← Kembali</a>

    <div class="player-wrap">
        <!-- Album Cover -->
        <div class="album-cover">
            <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop" alt="Album Art" id="albumArt">
            <div class="album-info">
                <div class="album-artist" id="artistName">FADILL</div>
                <div class="album-title" id="songName">Guitar Vibes</div>
            </div>
        </div>

        <!-- Vinyl -->
        <div class="vinyl-wrap">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-shine"></div>
                <div class="vinyl-label">
                    <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=100&h=100&fit=crop" alt="Label" id="labelArt">
                </div>
                <div class="vinyl-hole"></div>
            </div>
        </div>

        <!-- Volume -->
        <div class="volume-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </div>

        <!-- Progress -->
        <div class="progress-bar">
            <div class="progress-track" id="progressTrack">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-times">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="Prev">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn play" id="playBtn" title="Play">
                <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" id="nextBtn" title="Next">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <audio id="audio" preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ═══ CURSOR ═══
        const cur = document.getElementById('cur');
        let mx=-100,my=-100;
        document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
        (function a(){cur.style.left=mx+'px';cur.style.top=my+'px';requestAnimationFrame(a)})();
        document.querySelectorAll('a,button,.ctrl-btn,.progress-track,.volume-slider').forEach(el=>{
            el.addEventListener('mouseenter',()=>cur.classList.add('hover'));
            el.addEventListener('mouseleave',()=>cur.classList.remove('hover'));
        });

        // ═══ PLAYER ═══
        const audio = document.getElementById('audio');
        const vinyl = document.getElementById('vinyl');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const progressFill = document.getElementById('progressFill');
        const progressTrack = document.getElementById('progressTrack');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');

        let isPlaying = false;

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return m + ':' + String(sec).padStart(2,'0');
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                vinyl.classList.remove('spinning');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                audio.play().catch(()=>{});
                vinyl.classList.add('spinning');
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = pct + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            isPlaying = false;
            vinyl.classList.remove('spinning');
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            progressFill.style.width = '0%';
        });

        progressTrack.addEventListener('click', (e) => {
            if (audio.duration) {
                const rect = progressTrack.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                audio.currentTime = pct * audio.duration;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // playlist
        const playlist = [
            { src: 'music.mp3', artist: 'FADILL', title: 'Guitar Vibes', art: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop' },
        ];
        let currentTrack = 0;

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrack);
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
        });

        function loadTrack(i) {
            const t = playlist[i];
            audio.src = t.src;
            document.getElementById('artistName').textContent = t.artist;
            document.getElementById('songName').textContent = t.title;
            document.getElementById('albumArt').src = t.art;
            document.getElementById('labelArt').src = t.art;
            audio.load();
            if (isPlaying) { audio.play().catch(()=>{}); }
        }
    </script>
</body>
</html>
