<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <title>AI Poster Catalog Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-base: #0a0a0f;
            --bg-card: rgba(15, 15, 25, 0.8);
            --bg-card-solid: #0f0f1a;
            --bg-hover: rgba(25, 25, 40, 0.9);
            --bg-glass: rgba(15, 15, 30, 0.6);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --text-dim: #475569;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --badge-premium: linear-gradient(135deg, #f59e0b, #f97316);
            --badge-bestseller: linear-gradient(135deg, #6366f1, #8b5cf6);
            --badge-trending: linear-gradient(135deg, #f43f5e, #ec4899);
            --border-color: rgba(99, 102, 241, 0.15);
            --border-glow: rgba(99, 102, 241, 0.3);
            --font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-base);
            background-image: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.05), transparent);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 300px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .brand {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            letter-spacing: -0.5px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-box {
            margin-bottom: 28px;
            position: relative;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            z-index: 1;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 42px;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-family: var(--font-family);
            outline: none;
            transition: var(--transition);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-glow);
        }

        .filter-section {
            margin-bottom: 24px;
        }

        .filter-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
            padding: 12px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.88rem;
            font-family: var(--font-family);
            font-weight: 500;
            transition: var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: var(--transition-fast);
        }

        .filter-btn:hover {
            background: var(--bg-hover);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            color: var(--text-main);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .filter-btn.active::before {
            transform: scaleY(1);
        }

        .filter-count {
            margin-left: auto;
            font-size: 0.7rem;
            background: var(--bg-card-solid);
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--text-muted);
        }

        .filter-btn.active .filter-count {
            background: var(--accent-primary);
            color: white;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 36px;
            max-width: 1600px;
        }

        .header-section {
            margin-bottom: 36px;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .header-stats h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .stats-badge {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-cyan);
            border: 1px solid rgba(34, 211, 238, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(34, 211, 238, 0); }
        }

        /* ===== CATALOG GRID ===== */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border-color: var(--border-glow);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-preview {
            height: 200px;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .card-preview::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.05), transparent 70%);
        }

        .mockup-text {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin: 0;
            white-space: pre;
            line-height: 1.3;
            opacity: 0.6;
            transition: var(--transition);
        }

        .card:hover .mockup-text {
            opacity: 1;
            color: var(--text-muted);
        }

        .badge-container {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            backdrop-filter: blur(8px);
        }

        .badge.bestseller {
            background: var(--badge-bestseller);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .badge.trending {
            background: var(--badge-trending);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.4);
        }

        .badge.premium {
            background: var(--badge-premium);
            color: #000;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .difficulty {
            color: var(--accent-amber);
            letter-spacing: 1px;
        }

        .meta-divider {
            width: 1px;
            height: 14px;
            background: var(--border-color);
        }

        .card-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 18px;
            flex: 1;
            line-height: 1.7;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }

        .tag {
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--accent-primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: var(--transition-fast);
        }

        .tag:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-primary);
        }

        .prompt-section {
            background: var(--bg-card-solid);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-top: auto;
            overflow: hidden;
        }

        .prompt-toggle {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-main);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: var(--font-family);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-fast);
        }

        .prompt-toggle:hover {
            background: var(--bg-hover);
        }

        .prompt-toggle span {
            font-size: 0.75rem;
            transition: var(--transition-fast);
        }

        .prompt-content {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid var(--border-color);
        }

        .prompt-content.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .prompt-box {
            background: #050508;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.78rem;
            color: var(--accent-emerald);
            margin-top: 12px;
            max-height: 120px;
            overflow-y: auto;
            word-wrap: break-word;
            border: 1px solid rgba(16, 185, 129, 0.1);
            line-height: 1.6;
        }

        .prompt-box.negative {
            color: var(--accent-rose);
            border-color: rgba(244, 63, 94, 0.1);
        }

        .prompt-label {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 14px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .btn-copy {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            margin-top: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: var(--font-family);
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-copy::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: var(--transition);
        }

        .btn-copy:hover::before {
            transform: translateX(100%);
        }

        .btn-copy:hover {
            box-shadow: 0 8px 24px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-copy.success {
            background: linear-gradient(135deg, var(--accent-emerald), #059669);
        }

        .tech-specs {
            margin-top: 16px;
            font-size: 0.72rem;
            color: var(--text-dim);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .tech-specs div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tech-specs strong {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .catalog-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }
            .main-content {
                margin-left: 260px;
                padding: 28px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 20px;
                max-height: none;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .catalog-grid {
                grid-template-columns: 1fr;
            }
            .header-stats {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header-stats h1 {
                font-size: 1.6rem;
            }
        }

        /* ===== LOADING & EMPTY STATE ===== */
        .loading-state,
        .empty-state {
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .loading-gif,
        .empty-gif {
            width: 150px;
            height: auto;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .loading-state p,
        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ===== LAYOUT TOGGLE ===== */
        .layout-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .layout-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-card-solid);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition-fast);
        }

        .layout-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-main);
        }

        .layout-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* ===== CATEGORY THEMES ===== */
        .catalog-grid[data-category="Movie"] { --cat-accent: #f43f5e; --cat-glow: rgba(244, 63, 94, 0.2); }
        .catalog-grid[data-category="Anime"] { --cat-accent: #ec4899; --cat-glow: rgba(236, 72, 153, 0.2); }
        .catalog-grid[data-category="Japanese"] { --cat-accent: #ef4444; --cat-glow: rgba(239, 68, 68, 0.2); }
        .catalog-grid[data-category="Fantasy"] { --cat-accent: #8b5cf6; --cat-glow: rgba(139, 92, 246, 0.2); }
        .catalog-grid[data-category="Sci-Fi"] { --cat-accent: #06b6d4; --cat-glow: rgba(6, 182, 212, 0.2); }
        .catalog-grid[data-category="Luxury"] { --cat-accent: #f59e0b; --cat-glow: rgba(245, 158, 11, 0.2); }
        .catalog-grid[data-category="Art"] { --cat-accent: #10b981; --cat-glow: rgba(16, 185, 129, 0.2); }
        .catalog-grid[data-category="Trending"] { --cat-accent: #f97316; --cat-glow: rgba(249, 115, 22, 0.2); }
        .catalog-grid[data-category="Photography"] { --cat-accent: #64748b; --cat-glow: rgba(100, 116, 139, 0.2); }
        .catalog-grid[data-category="Special"] { --cat-accent: #fbbf24; --cat-glow: rgba(251, 191, 36, 0.3); }
        .catalog-grid[data-category="Hyper Realistic"] { --cat-accent: #e11d48; --cat-glow: rgba(225, 29, 72, 0.3); }

        .catalog-grid .card::before {
            background: linear-gradient(90deg, transparent, var(--cat-accent, var(--accent-primary)), transparent);
        }

        .catalog-grid .card:hover {
            border-color: var(--cat-accent, var(--border-glow));
            box-shadow: var(--shadow-lg), 0 0 30px var(--cat-glow, var(--accent-glow));
        }

        .catalog-grid .card .badge.bestseller {
            background: linear-gradient(135deg, var(--cat-accent, var(--accent-primary)), var(--cat-accent, var(--accent-secondary)));
        }

        /* ===== HORIZONTAL LAYOUT ===== */
        .catalog-grid.horizontal {
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .catalog-grid.horizontal .card {
            flex-direction: row;
            max-height: 200px;
        }

        .catalog-grid.horizontal .card-preview {
            width: 200px;
            height: 200px;
            min-width: 200px;
            border-bottom: none;
            border-right: 1px solid var(--border-color);
        }

        .catalog-grid.horizontal .card-content {
            padding: 20px;
        }

        .catalog-grid.horizontal .card-desc {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .catalog-grid.horizontal .tags-container {
            margin-bottom: 12px;
        }

        .catalog-grid.horizontal .prompt-section {
            display: none;
        }

        /* ===== VERTICAL LAYOUT (DEFAULT) ===== */
        .catalog-grid.vertical {
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        /* ===== ORIENTATION SUB-FILTER ===== */
        .orientation-bar {
            display: none;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }

        .orientation-bar.show {
            display: flex;
        }

        .orientation-bar .orientation-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .orientation-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-card-solid);

        // === KEAMANAN: Fungsi Copy Modern (Clipboard API + Fallback) ===
        window.copyText = async function(elementId, btnElement) {
            const textToCopy = document.getElementById(elementId).innerText.trim();
            const originalText = btnElement.innerHTML;
            
            try {
                // Modern Clipboard API (HTTPS/localhost only)
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                } else {
                    // Fallback: textarea method
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    textArea.style.cssText = "position:fixed;left:-9999px;top:-9999px;opacity:0";
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                
                btnElement.textContent = "✅ Berhasil Dicopy!";
                btnElement.classList.add('success');
                setTimeout(() => {
                    btnElement.innerHTML = originalText;
                    btnElement.classList.remove('success');
                }, 2000);
                
            } catch (err) {
                console.error('Copy failed:', err);
                // Fallback terakhir: select text dari elemen
                const range = document.createRange();
                range.selectNodeContents(document.getElementById(elementId));
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                alert("Tekan Ctrl+C untuk copy");
            }
        };

        // === DEBOUNCE UNTUK SEARCH ===
        let searchTimeout;
        function debounceSearch(callback, delay) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(callback, delay);
        }

        // === INISIALISASI ===
        document.addEventListener('DOMContentLoaded', () => {
            renderCards(posterData);
        });

    </script>
</body>
</html>
